<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 16px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #30363d;
    margin-bottom: 20px;
  }
  h1 { font-size: 1.2em; }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    font-size: 14px;
    cursor: pointer;
  }
  .btn:active { background: #30363d; }
  .btn-primary {
    background: #238636;
    border-color: #238636;
  }
  .btn-primary:disabled {
    background: #1a5c2a;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-merge {
    background: #8957e5;
    border-color: #8957e5;
    font-size: 13px;
    padding: 6px 12px;
  }
  .btn-sm {
    font-size: 12px;
    padding: 4px 10px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 1em;
    margin-bottom: 12px;
    color: #8b949e;
  }

  /* メモ入力 */
  textarea {
    width: 100%;
    height: 30vh;
    background: #0d1117;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 16px;
    resize: vertical;
  }
  textarea::placeholder { color: #484f58; }
  .memo-status {
    margin-top: 8px;
    font-size: 0.85em;
    padding: 8px;
    border-radius: 6px;
    display: none;
  }
  .memo-status.success { background: #1b4332; color: #95d5b2; display: block; }
  .memo-status.error { background: #4a1520; color: #f5a0a0; display: block; }
  .memo-status.info { background: #0d1117; color: #58a6ff; display: block; }
  .memo-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .memo-actions .btn { flex: 1; text-align: center; }

  /* Inbox */
  .inbox-count {
    font-size: 2em;
    font-weight: bold;
    color: #58a6ff;
  }
  .inbox-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .workflow-status { margin-top: 8px; }

  /* PR */
  .pr-item {
    border-bottom: 1px solid #21262d;
    padding: 12px 0;
  }
  .pr-item:last-child { border-bottom: none; }
  .pr-title {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 0.95em;
  }
  .pr-body {
    font-size: 0.85em;
    color: #8b949e;
    white-space: pre-wrap;
    margin-bottom: 8px;
    overflow-x: auto;
  }
  .pr-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9em;
  }
  .pr-body th, .pr-body td {
    border: 1px solid #30363d;
    padding: 4px 8px;
    text-align: left;
  }
  .status {
    font-size: 0.85em;
    color: #8b949e;
    padding: 8px 0;
  }
  .status.success { color: #3fb950; }
  .status.error { color: #f85149; }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
  }
  /* PAT期限切れバナー */
  .pat-expired-banner {
    background: #4a1520;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .pat-expired-banner span {
    color: #f5a0a0;
    font-size: 0.9em;
  }

  .modal h2 { margin-bottom: 12px; }
  .modal input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .modal p {
    font-size: 0.85em;
    color: #8b949e;
    margin-bottom: 12px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 12px;
  }
  /* 後で読むモーダル */
  .read-later-modal .modal {
    width: 95%;
    max-width: 500px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .read-later-body {
    overflow-y: auto;
    flex: 1;
    margin-top: 12px;
  }
  .read-later-body a {
    color: #58a6ff;
    text-decoration: none;
    word-break: break-all;
  }
  .read-later-item {
    border-bottom: 1px solid #21262d;
    padding: 10px 0;
  }
  .read-later-item:last-child { border-bottom: none; }
  .read-later-item .note {
    font-size: 0.85em;
    color: #8b949e;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>Knowledge Base</h1>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" onclick="showReadLater()">後で読む</button>
    <button class="btn btn-sm" onclick="showTokenModal()">PAT設定</button>
  </div>
</header>

<!-- PAT期限切れバナー -->
<div class="pat-expired-banner" id="patExpiredBanner" style="display:none">
  <span>PATの期限が切れています。再設定してください。</span>
  <button class="btn btn-sm" style="background:#f85149;border-color:#f85149;white-space:nowrap" onclick="showTokenModal()">再設定</button>
</div>

<!-- メモ入力 -->
<div class="card">
  <h2>メモ投稿</h2>
  <textarea id="memo" placeholder="メモ内容"></textarea>
  <div class="memo-actions">
    <button class="btn btn-primary" id="submitBtn" onclick="submitMemo()">投稿</button>
  </div>
  <div class="memo-status" id="memoStatus"></div>
</div>

<!-- Inbox管理 -->
<div class="card">
  <h2>Inbox</h2>
  <div class="inbox-row">
    <div>
      <span class="inbox-count" id="inboxCount">-</span>
      <span style="color:#8b949e"> 件</span>
    </div>
    <button class="btn btn-primary" id="processBtn" onclick="triggerProcess()" disabled>
      inbox処理
    </button>
  </div>
  <div class="workflow-status" id="workflowStatus"></div>
</div>

<!-- オープンPR -->
<div class="card">
  <h2>オープンPR</h2>
  <div id="prList"><span class="status">読み込み中...</span></div>
</div>

<!-- 後で読むモーダル -->
<div class="modal-overlay read-later-modal" id="readLaterModal" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>後で読む</h2>
      <button class="btn btn-sm" onclick="closeReadLater()">閉じる</button>
    </div>
    <div class="read-later-body" id="readLaterBody">
      <span class="status">読み込み中...</span>
    </div>
  </div>
</div>

<!-- PAT入力モーダル -->
<div class="modal-overlay" id="tokenModal" style="display:none">
  <div class="modal">
    <h2>GitHub PAT設定</h2>
    <p>Fine-grained Personal Access Tokenを入力してください。<br>
       必要な権限: Contents(R/W), Actions(R/W), Pull requests(R/W)<br>
       対象リポジトリ: knowledge-base</p>
    <input type="password" id="tokenInput" placeholder="github_pat_...">
    <div class="modal-actions">
      <button class="btn" onclick="closeTokenModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'kinokooya';
const REPO = 'knowledge-base';
const API = 'https://api.github.com';

function getToken() {
  return localStorage.getItem('gh_pat') || '';
}

function headers() {
  return {
    'Authorization': 'Bearer ' + getToken(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
}

// --- PAT期限切れ通知 ---
function showPatExpired() {
  document.getElementById('patExpiredBanner').style.display = 'flex';
}

function hidePatExpired() {
  document.getElementById('patExpiredBanner').style.display = 'none';
}

// --- PAT管理 ---
function showTokenModal() {
  document.getElementById('tokenModal').style.display = 'flex';
  document.getElementById('tokenInput').value = '';
}

function closeTokenModal() {
  document.getElementById('tokenModal').style.display = 'none';
}

function saveToken() {
  var token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  localStorage.setItem('gh_pat', token);
  closeTokenModal();
  hidePatExpired();
  init();
}

// --- 後で読む ---
async function showReadLater() {
  document.getElementById('readLaterModal').style.display = 'flex';
  var body = document.getElementById('readLaterBody');
  body.innerHTML = '<span class="status">読み込み中...</span>';
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/contents/notes/read-later.md',
      { headers: headers() }
    );
    if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
    if (!res.ok) throw new Error(res.status);
    var data = await res.json();
    var content = decodeURIComponent(escape(atob(data.content)));
    // 未読セクションをパース
    var unreadMatch = content.match(/## 未読\n([\s\S]*?)(?=\n## |$)/);
    if (!unreadMatch || !unreadMatch[1].trim()) {
      body.innerHTML = '<span class="status">未読の記事はありません</span>';
      return;
    }
    var items = unreadMatch[1].split(/\n- /).filter(function(s) { return s.trim(); });
    body.innerHTML = items.map(function(item) {
      var lines = item.trim().split('\n');
      var firstLine = lines[0];
      // [title](url) 形式
      var linkMatch = firstLine.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
      var url, title;
      if (linkMatch) {
        title = linkMatch[1];
        url = linkMatch[2];
      } else {
        // URL直書き形式
        var urlMatch = firstLine.match(/(https?:\/\/\S+)/);
        url = urlMatch ? urlMatch[0] : '';
        title = '';
      }
      // 2行目以降がメモ
      var note = lines.slice(1).map(function(l) { return l.trim(); }).filter(function(l) { return l; }).join(' ');
      if (!title && note) { title = note; note = ''; }
      var html = '<div class="read-later-item">';
      html += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(title || url) + '</a>';
      if (note) html += '<div class="note">' + escapeHtml(note) + '</div>';
      html += '</div>';
      return html;
    }).join('');
  } catch (e) {
    body.innerHTML = '<span class="status error">読み込みエラー: ' + escapeHtml(e.message) + '</span>';
  }
}

function closeReadLater() {
  document.getElementById('readLaterModal').style.display = 'none';
}

// --- メモ投稿 ---
function showMemoStatus(msg, type) {
  var el = document.getElementById('memoStatus');
  el.textContent = msg;
  el.className = 'memo-status ' + type;
}

function submitMemo() {
  var token = getToken();
  if (!token) {
    showMemoStatus('先にPATを設定してください', 'error');
    return;
  }
  var memo = document.getElementById('memo').value.trim();
  if (!memo) {
    showMemoStatus('メモを入力してください', 'error');
    return;
  }

  var fullMemo = memo;
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  showMemoStatus('送信中...', 'info');

  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var ts = now.getFullYear() + '-'
    + pad(now.getMonth()+1) + '-'
    + pad(now.getDate()) + '-'
    + pad(now.getHours())
    + pad(now.getMinutes())
    + pad(now.getSeconds());

  var encoded = btoa(unescape(encodeURIComponent(fullMemo)));
  var url = API + '/repos/' + OWNER + '/' + REPO + '/contents/inbox/' + ts + '.md';

  fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({
      message: 'add: inbox from mobile',
      content: encoded
    })
  })
  .then(function(res) {
    if (res.status === 401) {
      showPatExpired();
      showMemoStatus('PATの期限が切れています', 'error');
      return;
    }
    if (res.status === 201) {
      showMemoStatus('投稿成功: inbox/' + ts + '.md', 'success');
      document.getElementById('memo').value = '';
      fetchInboxCount();
    } else {
      return res.json().then(function(err) {
        showMemoStatus('エラー ' + res.status + ': ' + err.message, 'error');
      });
    }
  })
  .catch(function(e) {
    showMemoStatus('通信エラー: ' + e.message, 'error');
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '投稿';
  });
}

// --- inbox件数取得 ---
async function fetchInboxCount() {
  var el = document.getElementById('inboxCount');
  var btn = document.getElementById('processBtn');
  try {
    var res = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/inbox', { headers: headers() });
    if (!res.ok) throw new Error(res.status);
    var files = await res.json();
    var mdFiles = files.filter(function(f) { return f.name.endsWith('.md') && f.name !== '.gitkeep'; });
    el.textContent = mdFiles.length;
    btn.disabled = mdFiles.length === 0;
  } catch (e) {
    el.textContent = '?';
    btn.disabled = true;
    if (e.message === '401') showPatExpired();
  }
}

// --- inbox処理トリガー ---
async function triggerProcess() {
  var btn = document.getElementById('processBtn');
  var status = document.getElementById('workflowStatus');
  btn.disabled = true;
  btn.textContent = '起動中...';
  status.innerHTML = '';

  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/actions/workflows/inbox-process.yml/dispatches',
      {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ ref: 'main' })
      }
    );
    if (res.status === 401) {
      showPatExpired();
      status.innerHTML = '<span class="status error">PATの期限が切れています</span>';
      btn.textContent = 'inbox処理';
      btn.disabled = false;
      return;
    }
    if (!res.ok) {
      var text = await res.text();
      throw new Error(res.status + ': ' + text);
    }
    status.innerHTML = '<span class="status success">ワークフローを起動しました。PRが作成されるまでお待ちください。</span>';
    btn.textContent = 'inbox処理';
    startPolling();
  } catch (e) {
    status.innerHTML = '<span class="status error">エラー: ' + escapeHtml(e.message) + '</span>';
    btn.textContent = 'inbox処理';
    btn.disabled = false;
  }
}

// --- ポーリング ---
var pollTimer = null;
function startPolling() {
  var count = 0;
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async function() {
    count++;
    await fetchPRs();
    if (count >= 30) {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('processBtn').disabled = false;
    }
  }, 10000);
}

// --- PR一覧取得 ---
async function fetchPRs() {
  var el = document.getElementById('prList');
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/pulls?state=open&sort=created&direction=desc&per_page=10',
      { headers: headers() }
    );
    if (res.status === 401) { showPatExpired(); throw new Error(res.status); }
    if (!res.ok) throw new Error(res.status);
    var prs = await res.json();
    var inboxPRs = prs.filter(function(pr) { return pr.head.ref.startsWith('inbox-process/'); });

    if (inboxPRs.length === 0) {
      el.innerHTML = '<span class="status">inbox処理のオープンPRはありません</span>';
      return;
    }

    el.innerHTML = inboxPRs.map(function(pr) {
      return '<div class="pr-item">' +
        '<div class="pr-title">#' + pr.number + ' ' + escapeHtml(pr.title) + '</div>' +
        '<div class="pr-body">' + renderPRBody(pr.body || '') + '</div>' +
        '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="btn btn-merge" onclick="mergePR(' + pr.number + ', this)">マージ</button>' +
        '<button class="btn" style="background:#da3633;border-color:#da3633;font-size:13px;padding:6px 12px" onclick="closePR(' + pr.number + ', this)">却下</button>' +
        '</div></div>';
    }).join('');

    if (inboxPRs.length > 0 && pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('processBtn').disabled = false;
    }
  } catch (e) {
    el.innerHTML = '<span class="status error">PR取得エラー: ' + escapeHtml(e.message) + '</span>';
  }
}

// --- PRマージ ---
async function mergePR(prNumber, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = 'マージ中...';
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/pulls/' + prNumber + '/merge',
      {
        method: 'PUT',
        headers: headers(),
        body: JSON.stringify({ merge_method: 'squash' })
      }
    );
    if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
    if (!res.ok) {
      var data = await res.json();
      throw new Error(data.message || res.status);
    }
    // マージ成功 → DOMから即削除
    var prItem = btnEl.closest('.pr-item');
    prItem.remove();
    // 残りのPRがなければメッセージ表示
    var prList = document.getElementById('prList');
    if (!prList.querySelector('.pr-item')) {
      prList.innerHTML = '<span class="status">inbox処理のオープンPRはありません</span>';
    }
    fetchInboxCount();
  } catch (e) {
    btnEl.textContent = 'エラー';
    btnEl.style.background = '#f85149';
    alert('マージ失敗: ' + e.message);
  }
}

// --- PR却下 ---
async function closePR(prNumber, btnEl) {
  if (!confirm('このPRを却下しますか？\ninboxのファイルはそのまま残ります。')) return;
  btnEl.disabled = true;
  btnEl.textContent = '却下中...';
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/pulls/' + prNumber,
      {
        method: 'PATCH',
        headers: headers(),
        body: JSON.stringify({ state: 'closed' })
      }
    );
    if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
    if (!res.ok) {
      var data = await res.json();
      throw new Error(data.message || res.status);
    }
    btnEl.textContent = '却下済み';
    btnEl.style.background = '#6e7681';
    setTimeout(refresh, 1500);
  } catch (e) {
    btnEl.textContent = 'エラー';
    btnEl.style.background = '#f85149';
    alert('却下失敗: ' + e.message);
  }
}

// --- ユーティリティ ---
function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderPRBody(body) {
  var lines = body.split('\n');
  var html = '';
  var inTable = false;
  var isHeaderRow = true;

  for (var idx = 0; idx < lines.length; idx++) {
    var trimmed = lines[idx].trim();
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      if (trimmed.match(/^\|[\s\-|]+\|$/)) continue;
      if (!inTable) {
        html += '<table>';
        inTable = true;
        isHeaderRow = true;
      }
      var cells = trimmed.split('|').filter(function(_, i, a) { return i > 0 && i < a.length - 1; });
      var tag = isHeaderRow ? 'th' : 'td';
      html += '<tr>' + cells.map(function(c) { return '<' + tag + '>' + escapeHtml(c.trim()) + '</' + tag + '>'; }).join('') + '</tr>';
      isHeaderRow = false;
    } else {
      if (inTable) { html += '</table>'; inTable = false; }
      if (trimmed.startsWith('## ')) {
        html += '<strong>' + escapeHtml(trimmed.slice(3)) + '</strong><br>';
      } else if (trimmed) {
        html += escapeHtml(trimmed) + '<br>';
      }
    }
  }
  if (inTable) html += '</table>';
  return html;
}

async function refresh() {
  await Promise.all([fetchInboxCount(), fetchPRs()]);
}

function init() {
  refresh();
}

// --- 初期化 ---
document.addEventListener('DOMContentLoaded', function() {
  if (!getToken()) {
    showTokenModal();
  } else {
    init();
  }
  setInterval(refresh, 60000);
});
</script>

</body>
</html>
