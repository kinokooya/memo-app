<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 16px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #30363d;
    margin-bottom: 20px;
  }
  h1 { font-size: 1.2em; }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    font-size: 14px;
    cursor: pointer;
  }
  .btn:active { background: #30363d; }
  .btn-primary {
    background: #238636;
    border-color: #238636;
  }
  .btn-primary:disabled {
    background: #1a5c2a;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-sm {
    font-size: 12px;
    padding: 4px 10px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 1em;
    margin-bottom: 12px;
    color: #8b949e;
  }

  /* メモ入力 */
  textarea {
    width: 100%;
    height: 30vh;
    background: #0d1117;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 16px;
    resize: vertical;
  }
  textarea::placeholder { color: #484f58; }
  /* 入力モード切替 */
  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
  }
  .mode-tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 14px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #8b949e;
    cursor: pointer;
  }
  .mode-tab:first-child { border-radius: 6px 0 0 6px; }
  .mode-tab:last-child { border-radius: 0 6px 6px 0; }
  .mode-tab.active {
    background: #21262d;
    color: #e6edf3;
    border-color: #58a6ff;
  }
  .x-post-fields textarea { height: 20vh; }
  .x-post-fields textarea + textarea { height: 10vh; margin-top: 8px; }
  .x-post-fields .field-label {
    font-size: 0.8em;
    color: #8b949e;
    margin-bottom: 4px;
    margin-top: 8px;
  }
  .x-post-fields .field-label:first-child { margin-top: 0; }
  .memo-status {
    margin-top: 8px;
    font-size: 0.85em;
    padding: 8px;
    border-radius: 6px;
    display: none;
  }
  .memo-status.success { background: #1b4332; color: #95d5b2; display: block; }
  .memo-status.error { background: #4a1520; color: #f5a0a0; display: block; }
  .memo-status.info { background: #0d1117; color: #58a6ff; display: block; }
  .memo-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .memo-actions .btn { flex: 1; text-align: center; }

  /* Inbox */
  .inbox-count {
    font-size: 2em;
    font-weight: bold;
    color: #58a6ff;
  }
  .inbox-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .workflow-status { margin-top: 8px; }

  .status {
    font-size: 0.85em;
    color: #8b949e;
    padding: 8px 0;
  }
  .status.success { color: #3fb950; }
  .status.error { color: #f85149; }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
  }
  /* PAT期限切れバナー */
  .pat-expired-banner {
    background: #4a1520;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .pat-expired-banner span {
    color: #f5a0a0;
    font-size: 0.9em;
  }

  .modal h2 { margin-bottom: 12px; }
  .modal input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .modal p {
    font-size: 0.85em;
    color: #8b949e;
    margin-bottom: 12px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 12px;
  }
  /* 後で読むモーダル */
  .read-later-modal .modal {
    width: 95%;
    max-width: 500px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .read-later-body {
    overflow-y: auto;
    flex: 1;
    margin-top: 12px;
  }
  .read-later-body a {
    color: #58a6ff;
    text-decoration: none;
    word-break: break-all;
  }
  .read-later-item {
    border-bottom: 1px solid #21262d;
    padding: 10px 0;
  }
  .read-later-item:last-child { border-bottom: none; }
  .read-later-item .note {
    font-size: 0.85em;
    color: #8b949e;
    margin-top: 4px;
  }
  .read-later-item .actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .btn-done {
    background: #238636;
    border-color: #238636;
    font-size: 12px;
    padding: 4px 10px;
  }
  .btn-delete {
    background: #da3633;
    border-color: #da3633;
    font-size: 12px;
    padding: 4px 10px;
  }
  /* 感想入力モーダル */
  .impression-modal .modal {
    width: 95%;
    max-width: 450px;
  }
  .impression-modal textarea {
    height: 15vh;
    margin-top: 8px;
  }
  /* ToDoモーダル */
  .todo-modal .modal {
    width: 95%;
    max-width: 500px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .todo-body {
    overflow-y: auto;
    flex: 1;
    margin-top: 12px;
  }
  .todo-section-title {
    font-size: 0.85em;
    color: #8b949e;
    margin: 12px 0 6px;
    font-weight: 600;
  }
  .todo-section-title:first-child { margin-top: 0; }
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: #238636;
    width: 16px;
    height: 16px;
  }
  .todo-item .todo-text { flex: 1; font-size: 0.9em; }
  .todo-item .todo-due {
    font-size: 0.75em;
    color: #8b949e;
    white-space: nowrap;
  }
  .todo-item .todo-due.overdue { color: #f85149; }
  .btn-todo-delete {
    background: none;
    border: none;
    color: #6e7681;
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .btn-todo-delete:active { color: #f85149; }
  .todo-add-form {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #30363d;
  }
  .todo-add-form input[type="text"] {
    flex: 1;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
  }
  .todo-add-form input[type="date"] {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 13px;
    width: 130px;
  }
</style>
</head>
<body>

<header>
  <h1>Knowledge Base</h1>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" onclick="showReadLater()">後で読む</button>
    <button class="btn btn-sm" onclick="showTokenModal()">PAT設定</button>
  </div>
</header>

<!-- PAT期限切れバナー -->
<div class="pat-expired-banner" id="patExpiredBanner" style="display:none">
  <span>PATの期限が切れています。再設定してください。</span>
  <button class="btn btn-sm" style="background:#f85149;border-color:#f85149;white-space:nowrap" onclick="showTokenModal()">再設定</button>
</div>

<!-- メモ入力 -->
<div class="card">
  <h2>メモ投稿</h2>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('memo')">メモ</button>
    <button class="mode-tab" onclick="switchMode('xpost')">Xポスト</button>
  </div>
  <!-- 通常メモモード -->
  <div id="memoMode">
    <textarea id="memo" placeholder="メモ内容"></textarea>
  </div>
  <!-- Xポストモード -->
  <div id="xpostMode" style="display:none" class="x-post-fields">
    <div class="field-label">ポスト内容（コピペ）</div>
    <textarea id="xpostQuote" placeholder="Xのポスト内容を貼り付け"></textarea>
    <div class="field-label">自分のメモ（任意）</div>
    <textarea id="xpostMemo" placeholder="感想・気になった点など"></textarea>
  </div>
  <div class="memo-actions">
    <button class="btn btn-primary" id="submitBtn" onclick="submitMemo()">投稿</button>
  </div>
  <div class="memo-status" id="memoStatus"></div>
</div>

<!-- Inbox管理 -->
<div class="card">
  <h2>Inbox</h2>
  <div class="inbox-row">
    <div>
      <span class="inbox-count" id="inboxCount">-</span>
      <span style="color:#8b949e"> 件</span>
    </div>
    <button class="btn btn-primary" id="processBtn" onclick="triggerProcess()" disabled>
      inbox処理
    </button>
  </div>
  <div class="workflow-status" id="workflowStatus"></div>
</div>

<!-- ToDo -->
<div class="card">
  <h2>ToDo</h2>
  <div id="todoBody"></div>
  <div class="todo-add-form">
    <input type="text" id="todoNewText" placeholder="新しいタスク">
    <input type="date" id="todoNewDue">
    <button class="btn btn-primary btn-sm" onclick="addTodo()">追加</button>
  </div>
</div>

<!-- 後で読むモーダル -->
<div class="modal-overlay read-later-modal" id="readLaterModal" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>後で読む</h2>
      <button class="btn btn-sm" onclick="closeReadLater()">閉じる</button>
    </div>
    <div class="read-later-body" id="readLaterBody">
      <span class="status">読み込み中...</span>
    </div>
  </div>
</div>

<!-- 感想入力モーダル -->
<div class="modal-overlay impression-modal" id="impressionModal" style="display:none">
  <div class="modal">
    <h2>感想を記録</h2>
    <p id="impressionTarget"></p>
    <textarea id="impressionText" placeholder="読んだ感想・気づき（空欄でもOK）"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="cancelImpression()">キャンセル</button>
      <button class="btn btn-primary" id="impressionSubmitBtn" onclick="submitImpression()">既読にする</button>
    </div>
  </div>
</div>


<!-- PAT入力モーダル -->
<div class="modal-overlay" id="tokenModal" style="display:none">
  <div class="modal">
    <h2>GitHub PAT設定</h2>
    <p>Fine-grained Personal Access Tokenを入力してください。<br>
       必要な権限: Contents(R/W), Actions(R/W), Pull requests(R/W)<br>
       対象リポジトリ: knowledge-base</p>
    <input type="password" id="tokenInput" placeholder="github_pat_...">
    <div class="modal-actions">
      <button class="btn" onclick="closeTokenModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'kinokooya';
const REPO = 'knowledge-base';
const API = 'https://api.github.com';

// --- 入力モード切替 ---
var currentMode = 'memo';

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('memoMode').style.display = mode === 'memo' ? 'block' : 'none';
  document.getElementById('xpostMode').style.display = mode === 'xpost' ? 'block' : 'none';
  var tabs = document.querySelectorAll('.mode-tab');
  tabs[0].className = 'mode-tab' + (mode === 'memo' ? ' active' : '');
  tabs[1].className = 'mode-tab' + (mode === 'xpost' ? ' active' : '');
}

function getToken() {
  return localStorage.getItem('gh_pat') || '';
}

function headers() {
  return {
    'Authorization': 'Bearer ' + getToken(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
}

// --- PAT期限切れ通知 ---
function showPatExpired() {
  document.getElementById('patExpiredBanner').style.display = 'flex';
}

function hidePatExpired() {
  document.getElementById('patExpiredBanner').style.display = 'none';
}

// --- PAT管理 ---
function showTokenModal() {
  document.getElementById('tokenModal').style.display = 'flex';
  document.getElementById('tokenInput').value = '';
}

function closeTokenModal() {
  document.getElementById('tokenModal').style.display = 'none';
}

function saveToken() {
  var token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  localStorage.setItem('gh_pat', token);
  closeTokenModal();
  hidePatExpired();
  init();
}

// --- 後で読む ---
var readLaterData = { content: '', sha: '', items: [] };
var pendingImpressionIndex = -1;

function parseReadLaterItems(content) {
  var unreadMatch = content.match(/## 未読\n([\s\S]*?)(?=\n## |$)/);
  if (!unreadMatch || !unreadMatch[1].trim()) return [];
  return unreadMatch[1].split(/\n- /).filter(function(s) { return s.trim(); }).map(function(item) {
    var lines = item.trim().split('\n');
    var firstLine = lines[0];
    var linkMatch = firstLine.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
    var url, title;
    if (linkMatch) {
      title = linkMatch[1];
      url = linkMatch[2];
    } else {
      var urlMatch = firstLine.match(/(https?:\/\/\S+)/);
      url = urlMatch ? urlMatch[0] : '';
      title = '';
    }
    var note = lines.slice(1).map(function(l) { return l.trim(); }).filter(function(l) { return l; }).join(' ');
    if (!title && note) { title = note; note = ''; }
    return { raw: '- ' + item.trim(), url: url, title: title, note: note };
  });
}

function renderReadLaterList() {
  var body = document.getElementById('readLaterBody');
  if (readLaterData.items.length === 0) {
    body.innerHTML = '<span class="status">未読の記事はありません</span>';
    return;
  }
  body.innerHTML = readLaterData.items.map(function(item, idx) {
    var html = '<div class="read-later-item" id="rl-item-' + idx + '">';
    html += '<a href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' + escapeHtml(item.title || item.url) + '</a>';
    if (item.note) html += '<div class="note">' + escapeHtml(item.note) + '</div>';
    html += '<div class="actions">';
    html += '<button class="btn btn-done" onclick="markAsRead(' + idx + ')">読んだ</button>';
    html += '<button class="btn btn-delete" onclick="deleteReadLater(' + idx + ')">削除</button>';
    html += '</div></div>';
    return html;
  }).join('');
}

async function showReadLater() {
  document.getElementById('readLaterModal').style.display = 'flex';
  var body = document.getElementById('readLaterBody');
  body.innerHTML = '<span class="status">読み込み中...</span>';
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/contents/notes/read-later.md',
      { headers: headers() }
    );
    if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
    if (!res.ok) throw new Error(res.status);
    var data = await res.json();
    readLaterData.content = decodeURIComponent(escape(atob(data.content)));
    readLaterData.sha = data.sha;
    readLaterData.items = parseReadLaterItems(readLaterData.content);
    renderReadLaterList();
  } catch (e) {
    body.innerHTML = '<span class="status error">読み込みエラー: ' + escapeHtml(e.message) + '</span>';
  }
}

function closeReadLater() {
  document.getElementById('readLaterModal').style.display = 'none';
}

function markAsRead(idx) {
  pendingImpressionIndex = idx;
  var item = readLaterData.items[idx];
  document.getElementById('impressionTarget').textContent = item.title || item.url;
  document.getElementById('impressionText').value = '';
  document.getElementById('impressionModal').style.display = 'flex';
}

function cancelImpression() {
  document.getElementById('impressionModal').style.display = 'none';
  pendingImpressionIndex = -1;
}

async function submitImpression() {
  var idx = pendingImpressionIndex;
  if (idx < 0) return;
  var impression = document.getElementById('impressionText').value.trim();
  var btn = document.getElementById('impressionSubmitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    await updateReadLaterFile('read', idx, impression);
    // 感想があればinboxにもメモとして投稿
    if (impression) {
      var item = readLaterData.items[idx];
      var title = item.title || item.url;
      var inboxMemo = '# 読んだ記事の感想\n\n';
      inboxMemo += '記事: ' + (item.title ? '[' + item.title + '](' + item.url + ')' : item.url) + '\n\n';
      if (item.note) inboxMemo += '元メモ: ' + item.note + '\n\n';
      inboxMemo += '感想: ' + impression;
      await postToInbox(inboxMemo);
    }
    document.getElementById('impressionModal').style.display = 'none';
    pendingImpressionIndex = -1;
    renderReadLaterList();
  } catch (e) {
    alert('保存失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '既読にする';
  }
}

async function deleteReadLater(idx) {
  if (!confirm('この記事を削除しますか？')) return;
  var el = document.getElementById('rl-item-' + idx);
  var btns = el.querySelectorAll('button');
  btns.forEach(function(b) { b.disabled = true; });
  try {
    await updateReadLaterFile('delete', idx, '');
    renderReadLaterList();
  } catch (e) {
    alert('削除失敗: ' + e.message);
    btns.forEach(function(b) { b.disabled = false; });
  }
}

async function postToInbox(memoContent) {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var ts = now.getFullYear() + '-'
    + pad(now.getMonth()+1) + '-'
    + pad(now.getDate()) + '-'
    + pad(now.getHours())
    + pad(now.getMinutes())
    + pad(now.getSeconds());
  var encoded = btoa(unescape(encodeURIComponent(memoContent)));
  var res = await fetch(
    API + '/repos/' + OWNER + '/' + REPO + '/contents/inbox/' + ts + '.md',
    {
      method: 'PUT',
      headers: headers(),
      body: JSON.stringify({
        message: 'add: 読んだ記事の感想',
        content: encoded
      })
    }
  );
  if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
  if (!res.ok) {
    var err = await res.json();
    throw new Error(err.message || res.status);
  }
}

async function updateReadLaterFile(action, idx, impression) {
  var item = readLaterData.items[idx];
  var content = readLaterData.content;

  // 未読セクションから該当アイテムを除去
  content = content.replace(item.raw + '\n', '').replace(item.raw, '');
  // 連続する空行を整理
  content = content.replace(/## 未読\n\n\n+/g, '## 未読\n\n');

  if (action === 'read') {
    // 既読セクションに追記
    var now = new Date();
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var dateStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
    var entry = '- ' + (item.title ? '[' + item.title + '](' + item.url + ')' : item.url);
    entry += ' (' + dateStr + ')';
    if (impression) entry += '\n  感想: ' + impression;
    // ## 既読 の直後に追記
    if (content.indexOf('## 既読\n') !== -1) {
      content = content.replace('## 既読\n', '## 既読\n\n' + entry + '\n');
    } else {
      content = content.trimEnd() + '\n\n## 既読\n\n' + entry + '\n';
    }
  }

  // GitHub APIでファイル更新
  var encoded = btoa(unescape(encodeURIComponent(content)));
  var res = await fetch(
    API + '/repos/' + OWNER + '/' + REPO + '/contents/notes/read-later.md',
    {
      method: 'PUT',
      headers: headers(),
      body: JSON.stringify({
        message: action === 'read' ? 'update: read-later 既読に移動' : 'update: read-later 記事削除',
        content: encoded,
        sha: readLaterData.sha
      })
    }
  );
  if (res.status === 401) { showPatExpired(); throw new Error('PATの期限が切れています'); }
  if (!res.ok) {
    var err = await res.json();
    throw new Error(err.message || res.status);
  }
  var result = await res.json();
  // shaとデータを更新
  readLaterData.sha = result.content.sha;
  readLaterData.content = content;
  readLaterData.items.splice(idx, 1);
}

// --- ToDo（localStorage保存） ---
var todoData = { dueTasks: [], anyTimeTasks: [], doneTasks: [] };

function loadTodoFromStorage() {
  var saved = localStorage.getItem('todo_data');
  if (saved) {
    try { todoData = JSON.parse(saved); } catch (e) { /* ignore */ }
  }
}

// 初回移行: todo.mdからlocalStorageへデータを移行
async function migrateTodoFromGitHub() {
  if (localStorage.getItem('todo_migrated')) return;
  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/contents/notes/todo.md',
      { headers: headers() }
    );
    if (!res.ok) { localStorage.setItem('todo_migrated', '1'); return; }
    var data = await res.json();
    var content = decodeURIComponent(escape(atob(data.content)));
    var due = [], anyTime = [], done = [];
    var section = '';
    content.split('\n').forEach(function(line) {
      if (line.match(/^## 期限あり/)) { section = 'due'; return; }
      if (line.match(/^## いつでも/)) { section = 'anytime'; return; }
      if (line.match(/^## 完了/)) { section = 'done'; return; }
      var taskMatch = line.match(/^- \[([ x])\] (.+)/);
      if (!taskMatch) return;
      var text = taskMatch[2];
      var dueMatch = text.match(/\(due: (\d{4}-\d{2}-\d{2})\)/);
      var doneMatch = text.match(/\(done: (\d{4}-\d{2}-\d{2})\)/);
      var item = {
        text: text.replace(/\s*\(due: \d{4}-\d{2}-\d{2}\)/, '').replace(/\s*\(done: \d{4}-\d{2}-\d{2}\)/, '').trim(),
        due: dueMatch ? dueMatch[1] : '',
        doneDate: doneMatch ? doneMatch[1] : '',
        checked: taskMatch[1] === 'x'
      };
      if (section === 'done' || item.checked) done.push(item);
      else if (section === 'due') due.push(item);
      else if (section === 'anytime') anyTime.push(item);
    });
    if (due.length || anyTime.length || done.length) {
      todoData = { dueTasks: due, anyTimeTasks: anyTime, doneTasks: done };
      saveTodoToStorage();
    }
  } catch (e) { /* ignore */ }
  localStorage.setItem('todo_migrated', '1');
}

function saveTodoToStorage() {
  // 完了タスクは直近5件のみ保持
  todoData.doneTasks = todoData.doneTasks.slice(0, 5);
  localStorage.setItem('todo_data', JSON.stringify(todoData));
  renderTodoList();
}

function todayStr() {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
}

function isOverdue(dueStr) {
  if (!dueStr) return false;
  return dueStr < todayStr();
}

function renderTodoList() {
  var body = document.getElementById('todoBody');
  var html = '';

  if (todoData.dueTasks.length > 0) {
    html += '<div class="todo-section-title">期限あり</div>';
    todoData.dueTasks.forEach(function(t, i) {
      var overdue = isOverdue(t.due) ? ' overdue' : '';
      html += '<div class="todo-item">';
      html += '<input type="checkbox" onchange="completeTodo(\'due\',' + i + ')">';
      html += '<span class="todo-text">' + escapeHtml(t.text) + '</span>';
      if (t.due) html += '<span class="todo-due' + overdue + '">' + escapeHtml(t.due) + '</span>';
      html += '<button class="btn-todo-delete" onclick="deleteTodo(\'due\',' + i + ')">&times;</button>';
      html += '</div>';
    });
  }

  if (todoData.anyTimeTasks.length > 0) {
    html += '<div class="todo-section-title">いつでも</div>';
    todoData.anyTimeTasks.forEach(function(t, i) {
      html += '<div class="todo-item">';
      html += '<input type="checkbox" onchange="completeTodo(\'anytime\',' + i + ')">';
      html += '<span class="todo-text">' + escapeHtml(t.text) + '</span>';
      if (t.createdAt) html += '<span class="todo-due">' + escapeHtml(t.createdAt) + '</span>';
      html += '<button class="btn-todo-delete" onclick="deleteTodo(\'anytime\',' + i + ')">&times;</button>';
      html += '</div>';
    });
  }

  if (todoData.dueTasks.length === 0 && todoData.anyTimeTasks.length === 0) {
    html += '<span class="status">タスクはありません</span>';
  }

  if (todoData.doneTasks.length > 0) {
    html += '<div class="todo-section-title">完了（直近' + todoData.doneTasks.length + '件）</div>';
    todoData.doneTasks.forEach(function(t, i) {
      html += '<div class="todo-item" style="opacity:0.5">';
      html += '<input type="checkbox" checked onchange="undoTodo(' + i + ')">';
      html += '<span class="todo-text" style="text-decoration:line-through">' + escapeHtml(t.text) + '</span>';
      if (t.doneDate) html += '<span class="todo-due">' + escapeHtml(t.doneDate) + '</span>';
      html += '<button class="btn-todo-delete" onclick="deleteTodo(\'done\',' + i + ')">&times;</button>';
      html += '</div>';
    });
  }

  // エクスポート/インポート
  html += '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">';
  html += '<button class="btn btn-sm" style="font-size:11px;opacity:0.5" onclick="exportTodo()">export</button>';
  html += '<button class="btn btn-sm" style="font-size:11px;opacity:0.5" onclick="importTodo()">import</button>';
  html += '</div>';

  body.innerHTML = html;
}


function completeTodo(section, idx) {
  var task;
  if (section === 'due') {
    task = todoData.dueTasks.splice(idx, 1)[0];
  } else {
    task = todoData.anyTimeTasks.splice(idx, 1)[0];
  }
  task.checked = true;
  task.doneDate = todayStr();
  todoData.doneTasks.unshift(task);
  saveTodoToStorage();
  renderTodoList();
}

function undoTodo(idx) {
  var task = todoData.doneTasks.splice(idx, 1)[0];
  task.checked = false;
  task.doneDate = '';
  if (task.due) {
    todoData.dueTasks.push(task);
    todoData.dueTasks.sort(function(a, b) { return (a.due || '9999') < (b.due || '9999') ? -1 : 1; });
  } else {
    todoData.anyTimeTasks.push(task);
  }
  saveTodoToStorage();
  renderTodoList();
}

function deleteTodo(section, idx) {
  if (!confirm('このタスクを削除しますか？')) return;
  if (section === 'due') todoData.dueTasks.splice(idx, 1);
  else if (section === 'anytime') todoData.anyTimeTasks.splice(idx, 1);
  else todoData.doneTasks.splice(idx, 1);
  saveTodoToStorage();
  renderTodoList();
}

function addTodo() {
  var textEl = document.getElementById('todoNewText');
  var dueEl = document.getElementById('todoNewDue');
  var text = textEl.value.trim();
  if (!text) return;
  var due = dueEl.value;
  var task = { text: text, due: due, doneDate: '', checked: false, createdAt: todayStr() };
  if (due) {
    todoData.dueTasks.push(task);
    todoData.dueTasks.sort(function(a, b) { return (a.due || '9999') < (b.due || '9999') ? -1 : 1; });
  } else {
    todoData.anyTimeTasks.push(task);
  }
  saveTodoToStorage();
  renderTodoList();
  textEl.value = '';
  dueEl.value = '';
}

function exportTodo() {
  var json = JSON.stringify(todoData, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'todo-backup-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importTodo() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (data.dueTasks && data.anyTimeTasks && data.doneTasks) {
          todoData = data;
          saveTodoToStorage();
          renderTodoList();
        } else {
          alert('無効なファイル形式です');
        }
      } catch (err) {
        alert('読み込みエラー: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// --- メモ投稿 ---
function showMemoStatus(msg, type) {
  var el = document.getElementById('memoStatus');
  el.textContent = msg;
  el.className = 'memo-status ' + type;
}

function submitMemo() {
  var token = getToken();
  if (!token) {
    showMemoStatus('先にPATを設定してください', 'error');
    return;
  }

  var fullMemo;
  if (currentMode === 'xpost') {
    var quote = document.getElementById('xpostQuote').value.trim();
    if (!quote) {
      showMemoStatus('ポスト内容を入力してください', 'error');
      return;
    }
    var userMemo = document.getElementById('xpostMemo').value.trim();
    fullMemo = '---\ntype: x_post\n---\n\n## 引用\n\n' + quote;
    if (userMemo) {
      fullMemo += '\n\n## メモ\n\n' + userMemo;
    }
  } else {
    var memo = document.getElementById('memo').value.trim();
    if (!memo) {
      showMemoStatus('メモを入力してください', 'error');
      return;
    }
    fullMemo = memo;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  showMemoStatus('送信中...', 'info');

  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var ts = now.getFullYear() + '-'
    + pad(now.getMonth()+1) + '-'
    + pad(now.getDate()) + '-'
    + pad(now.getHours())
    + pad(now.getMinutes())
    + pad(now.getSeconds());

  var encoded = btoa(unescape(encodeURIComponent(fullMemo)));
  var url = API + '/repos/' + OWNER + '/' + REPO + '/contents/inbox/' + ts + '.md';

  fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({
      message: 'add: inbox from mobile',
      content: encoded
    })
  })
  .then(function(res) {
    if (res.status === 401) {
      showPatExpired();
      showMemoStatus('PATの期限が切れています', 'error');
      return;
    }
    if (res.status === 201) {
      showMemoStatus('投稿成功: inbox/' + ts + '.md', 'success');
      document.getElementById('memo').value = '';
      document.getElementById('xpostQuote').value = '';
      document.getElementById('xpostMemo').value = '';
      fetchInboxCount();
    } else {
      return res.json().then(function(err) {
        showMemoStatus('エラー ' + res.status + ': ' + err.message, 'error');
      });
    }
  })
  .catch(function(e) {
    showMemoStatus('通信エラー: ' + e.message, 'error');
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '投稿';
  });
}

// --- inbox件数取得 ---
async function fetchInboxCount() {
  var el = document.getElementById('inboxCount');
  var btn = document.getElementById('processBtn');
  try {
    var res = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/inbox', { headers: headers() });
    if (!res.ok) throw new Error(res.status);
    var files = await res.json();
    var mdFiles = files.filter(function(f) { return f.name.endsWith('.md') && f.name !== '.gitkeep'; });
    el.textContent = mdFiles.length;
    btn.disabled = mdFiles.length === 0;
  } catch (e) {
    el.textContent = '?';
    btn.disabled = true;
    if (e.message === '401') showPatExpired();
  }
}

// --- inbox処理トリガー ---
async function triggerProcess() {
  var btn = document.getElementById('processBtn');
  var status = document.getElementById('workflowStatus');
  btn.disabled = true;
  btn.textContent = '起動中...';
  status.innerHTML = '';

  try {
    var res = await fetch(
      API + '/repos/' + OWNER + '/' + REPO + '/actions/workflows/inbox-process.yml/dispatches',
      {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ ref: 'main' })
      }
    );
    if (res.status === 401) {
      showPatExpired();
      status.innerHTML = '<span class="status error">PATの期限が切れています</span>';
      btn.textContent = 'inbox処理';
      btn.disabled = false;
      return;
    }
    if (!res.ok) {
      var text = await res.text();
      throw new Error(res.status + ': ' + text);
    }
    status.innerHTML = '<span class="status success">ワークフローを起動しました。完了まで少しお待ちください。</span>';
    btn.textContent = 'inbox処理';
    startPolling();
  } catch (e) {
    status.innerHTML = '<span class="status error">エラー: ' + escapeHtml(e.message) + '</span>';
    btn.textContent = 'inbox処理';
    btn.disabled = false;
  }
}

// --- ポーリング（inbox件数更新） ---
var pollTimer = null;
function startPolling() {
  var count = 0;
  var prevCount = document.getElementById('inboxCount').textContent;
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async function() {
    count++;
    await fetchInboxCount();
    var newCount = document.getElementById('inboxCount').textContent;
    // inbox件数が減ったら処理完了
    if (newCount !== prevCount && newCount !== '?') {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('processBtn').disabled = false;
      document.getElementById('workflowStatus').innerHTML = '<span class="status success">処理完了！</span>';
      return;
    }
    if (count >= 30) {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('processBtn').disabled = false;
    }
  }, 10000);
}

// --- ユーティリティ ---
function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function refresh() {
  await fetchInboxCount();
}

async function init() {
  await migrateTodoFromGitHub();
  loadTodoFromStorage();
  renderTodoList();
  refresh();
}

// --- 初期化 ---
document.addEventListener('DOMContentLoaded', function() {
  if (!getToken()) {
    showTokenModal();
  } else {
    init();
  }
  setInterval(refresh, 60000);
});
</script>
